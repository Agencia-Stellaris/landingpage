<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta -->
    <title>Stellaris | Agencia de Marketing Digital en Colombia</title>
    <meta
      name="description"
      content="Agencia de marketing digital en Colombia. Estrategias de redes sociales, desarrollo web, WhatsApp marketing y email marketing para empresas que buscan resultados reales y medibles."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.stellaris.com.co/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_CO" />
    <meta property="og:title" content="Stellaris | Agencia de Marketing Digital en Colombia" />
    <meta
      property="og:description"
      content="Estrategias de redes sociales, desarrollo web, WhatsApp y email marketing para empresas que quieren crecer en digital."
    />
    <meta property="og:url" content="https://www.stellaris.com.co/" />
    <meta property="og:site_name" content="Stellaris" />
    <meta property="og:image" content="https://www.stellaris.com.co/og-default.png" />
    <meta property="og:image:alt" content="Stellaris — Agencia de Marketing Digital en Colombia" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Stellaris | Agencia de Marketing Digital en Colombia" />
    <meta
      name="twitter:description"
      content="Estrategias de redes sociales, desarrollo web, WhatsApp y email marketing."
    />
    <meta name="twitter:image" content="https://www.stellaris.com.co/og-default.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Preload critical fonts (heading + body 400, latin subset).
         File names are kept stable by assetFileNames in vite.config.ts so
         these URLs don't break between builds. Prevents FOUT-driven CLS on
         the hero <h1>. -->
    <link
      rel="preload"
      href="/assets/space-grotesk-latin-wght-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/assets/dm-sans-latin-400-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
